<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#0f2040"/></linearGradient>
    <linearGradient id="tankGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1d4ed8"/><stop offset="100%" style="stop-color:#1e3a8a"/></linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#38bdf8"/><stop offset="100%" style="stop-color:#0284c7"/></linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg16)"/>
  <!-- Tank 1 - Inlet Screen -->
  <rect x="30" y="80" width="90" height="160" rx="4" fill="url(#tankGrad)" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="80" width="90" height="90" rx="4" fill="url(#waterGrad)" opacity="0.6"/>
  <!-- Screen bars in tank 1 -->
  <line x1="50" y1="80" x2="50" y2="240" stroke="#93c5fd" stroke-width="2"/>
  <line x1="62" y1="80" x2="62" y2="240" stroke="#93c5fd" stroke-width="2"/>
  <line x1="74" y1="80" x2="74" y2="240" stroke="#93c5fd" stroke-width="2"/>
  <line x1="86" y1="80" x2="86" y2="240" stroke="#93c5fd" stroke-width="2"/>
  <line x1="98" y1="80" x2="98" y2="240" stroke="#93c5fd" stroke-width="2"/>
  <line x1="110" y1="80" x2="110" y2="240" stroke="#93c5fd" stroke-width="2"/>
  <text x="75" y="265" font-family="Arial" font-size="9" fill="#c8a96e" text-anchor="middle">Bar Screen</text>

  <!-- Flow pipe -->
  <rect x="120" y="155" width="50" height="18" fill="#374151"/>
  <polygon points="165,148 178,164 165,180" fill="#c8a96e"/>

  <!-- Tank 2 - Grit Chamber -->
  <rect x="180" y="80" width="100" height="160" rx="4" fill="url(#tankGrad)" stroke="#3b82f6" stroke-width="2"/>
  <rect x="180" y="130" width="100" height="110" rx="4" fill="url(#waterGrad)" opacity="0.5"/>
  <!-- Grit settling -->
  <rect x="180" y="220" width="100" height="20" rx="2" fill="#92400e" opacity="0.6"/>
  <text x="230" y="265" font-family="Arial" font-size="9" fill="#c8a96e" text-anchor="middle">Grit Chamber</text>

  <!-- Flow pipe 2 -->
  <rect x="280" y="155" width="50" height="18" fill="#374151"/>
  <polygon points="325,148 338,164 325,180" fill="#c8a96e"/>

  <!-- Tank 3 - STP -->
  <rect x="340" y="60" width="120" height="180" rx="4" fill="url(#tankGrad)" stroke="#3b82f6" stroke-width="2"/>
  <rect x="340" y="100" width="120" height="140" rx="4" fill="url(#waterGrad)" opacity="0.45"/>
  <!-- Drum screen -->
  <ellipse cx="400" cy="140" rx="42" ry="42" fill="none" stroke="#93c5fd" stroke-width="3" stroke-dasharray="8,4"/>
  <ellipse cx="400" cy="140" rx="25" ry="25" fill="#1e3a8a" stroke="#93c5fd" stroke-width="2"/>
  <line x1="400" y1="100" x2="400" y2="98" stroke="#9ca3af" stroke-width="4"/>
  <text x="400" y="265" font-family="Arial" font-size="9" fill="#c8a96e" text-anchor="middle">Drum Screen</text>

  <!-- Outlet -->
  <rect x="460" y="155" width="60" height="18" fill="#374151"/>
  <polygon points="515,148 528,164 515,180" fill="#c8a96e"/>
  <text x="543" y="175" font-family="Arial" font-size="9" fill="#38bdf8">OUT</text>

  <!-- Title -->
  <text x="300" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#c8a96e" text-anchor="middle">WATER &amp; WASTEWATER TREATMENT</text>
  <text x="300" y="48" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">STP · ETP · SPS | Screens · Grit Removal · Drums</text>
</svg>
