    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#8a9ab0"/><stop offset="50%" style="stop-color:#4a5a6a"/><stop offset="100%" style="stop-color:#2a3a4a"/></linearGradient>
