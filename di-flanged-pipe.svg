<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="pipe2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#718096"/>
      <stop offset="40%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="flange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a0aec0"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg2)"/>
  <!-- Main pipe body -->
  <rect x="100" y="115" width="400" height="70" rx="4" fill="url(#pipe2)"/>
  <rect x="100" y="118" width="400" height="10" rx="2" fill="rgba(255,255,255,0.1)"/>
  <!-- Left flange -->
  <rect x="80" y="95" width="38" height="110" rx="4" fill="url(#flange)"/>
  <circle cx="89" cy="112" r="5" fill="#2d3748"/>
  <circle cx="89" cy="188" r="5" fill="#2d3748"/>
  <circle cx="109" cy="104" r="5" fill="#2d3748"/>
  <circle cx="109" cy="196" r="5" fill="#2d3748"/>
  <!-- Right flange -->
  <rect x="482" y="95" width="38" height="110" rx="4" fill="url(#flange)"/>
  <circle cx="491" cy="112" r="5" fill="#2d3748"/>
  <circle cx="491" cy="188" r="5" fill="#2d3748"/>
  <circle cx="511" cy="104" r="5" fill="#2d3748"/>
  <circle cx="511" cy="196" r="5" fill="#2d3748"/>
  <!-- Bolt circles -->
  <circle cx="99" cy="112" r="4" fill="#a0aec0" stroke="#2d3748" stroke-width="1"/>
  <circle cx="99" cy="188" r="4" fill="#a0aec0" stroke="#2d3748" stroke-width="1"/>
  <circle cx="501" cy="112" r="4" fill="#a0aec0" stroke="#2d3748" stroke-width="1"/>
  <circle cx="501" cy="188" r="4" fill="#a0aec0" stroke="#2d3748" stroke-width="1"/>
  <!-- Label -->
  <text x="300" y="240" font-family="Arial" font-size="14" font-weight="bold" fill="#c8a96e" text-anchor="middle">DI DOUBLE FLANGED PIPE</text>
  <text x="300" y="260" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">80–1000 mm | K7 &amp; K9 | IS:8329 | Screwed/Welded</text>
  <!-- Dimension arrow -->
  <line x1="100" y1="270" x2="500" y2="270" stroke="#c8a96e" stroke-width="1"/>
  <polygon points="100,266 100,274 88,270" fill="#c8a96e"/>
  <polygon points="500,266 500,274 512,270" fill="#c8a96e"/>
  <text x="300" y="285" font-family="Arial" font-size="9" fill="#c8a96e" text-anchor="middle">Effective Length</text>
</svg>
