    <linearGradient id="ciFit" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#7a8090"/><stop offset="50%" style="stop-color:#3a4050"/><stop offset="100%" style="stop-color:#1a1f2e"/></linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg6)"/>
